<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DRAVYA η Geometry</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { display: block; }
</style>
</head>
<body>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 10, 30);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// lights
scene.add(new THREE.AmbientLight(0xffffff, 0.4));
const dir = new THREE.DirectionalLight(0xffffff, 1);
dir.position.set(10, 20, 10);
scene.add(dir);

// axis (beam direction = Z)
const axes = new THREE.AxesHelper(10);
scene.add(axes);

function thetaFromEta(eta) {
  return 2 * Math.atan(Math.exp(-eta));
}

function createEtaCone(eta, color) {
  const theta = thetaFromEta(eta);
  const maxZ = 20;
  const geometry = new THREE.BufferGeometry();

  const segments = 64;
  const rings = 32;

  const positions = [];

  for (let i = 0; i <= rings; i++) {
    const z = (i / rings) * maxZ;

    const radius = z * Math.tan(theta);

    for (let j = 0; j <= segments; j++) {
      const angle = (j / segments) * Math.PI * 2;

      const x = radius * Math.cos(angle);
      const y = radius * Math.sin(angle);

      positions.push(x, y, z);
    }
  }

  geometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const material = new THREE.PointsMaterial({
    color,
    size: 0.08
  });

  return new THREE.Points(geometry, material);
}

// η surfaces
const etaValues = [0, 1, 2, 3, 4];

etaValues.forEach((eta, i) => {
  const colors = [0xff4444, 0xffaa00, 0x00ffcc, 0x4488ff, 0xaa44ff];
  const cone = createEtaCone(eta, colors[i]);
  scene.add(cone);
});

// beam line
const beamGeo = new THREE.CylinderGeometry(0.02, 0.02, 40);
const beamMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const beam = new THREE.Mesh(beamGeo, beamMat);
beam.rotation.x = Math.PI / 2;
scene.add(beam);

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
