<!DOCTYPE html>
<html>
<head>
    <title>DRAVYA Model Viewer</title>
    <style>
        body{
            margin:0;
            overflow:hidden;
            background:#0b1020;
        }
    </style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
    
<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

console.log("Three loaded successfully");


// SCENE
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1020);

// CAMERA
const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
);

camera.position.set(0, 2, 8);

// RENDERER
const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(renderer.domElement);

// LIGHTS
scene.add(new THREE.AmbientLight(0xffffff, 2));

const light = new THREE.DirectionalLight(
    0xffffff,
    2
);

light.position.set(5,10,5);

scene.add(light);

// MODEL
const loader = new GLTFLoader();

let dravyaModel;

loader.load(
    "./models/dravya.glb",

    (gltf)=>{

        dravyaModel = gltf.scene;

        dravyaModel.scale.set(1,1,1);

        dravyaModel.position.set(0,0,0);

        scene.add(dravyaModel);

    },

    undefined,

    (error)=>{
        console.error(error);
    }
);

// CLOCK
const clock = new THREE.Clock();

// ANIMATION LOOP
function animate(){

    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();

    if(dravyaModel){

        // float
        dravyaModel.position.y =
            Math.sin(t * 1.5) * 0.5;

        // rotate
        dravyaModel.rotation.y += 0.003;
    }

    renderer.render(scene,camera);
}

animate();

// RESIZE
window.addEventListener(
    "resize",
    ()=>{

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );

    }
);

</script>

</body>
</html>
