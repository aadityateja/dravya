<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DRAVYA Universe v1</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
#ui {
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    color:white;
    font-family:Arial;
    background:rgba(0,0,0,0.5);
    padding:10px;
    border-radius:10px;
}
button { margin:4px; padding:6px; }
</style>
</head>
<body>

<div id="ui">
<button onclick="emitEM()">Emit EM Pulse</button>
<button onclick="emitGW()">Trigger GW Event</button>
<div id="readout">Detector: --</div>
</div>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";
import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js";

// ---------------- SCENE ----------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000010);

const camera = new THREE.PerspectiveCamera(
    60,
    innerWidth/innerHeight,
    0.1,
    1000
);

camera.position.set(0,20,40);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);

// ---------------- LIGHT ----------------
scene.add(new THREE.AmbientLight(0xffffff,0.4));

const sunLight = new THREE.PointLight(0xffaa33,2,200);
scene.add(sunLight);

// ---------------- SUN ----------------
const sunGeo = new THREE.SphereGeometry(2,32,32);
const sunMat = new THREE.MeshBasicMaterial({color:0xffcc00});
const sun = new THREE.Mesh(sunGeo,sunMat);
scene.add(sun);

// ---------------- EARTH ----------------
const earthGeo = new THREE.SphereGeometry(1,32,32);
const earthMat = new THREE.MeshStandardMaterial({color:0x3399ff});
const earth = new THREE.Mesh(earthGeo,earthMat);
earth.position.set(15,0,0);
scene.add(earth);

// ---------------- GRID (SPACETIME) ----------------
const gridSize = 30;
const divisions = 30;

const grid = new THREE.GridHelper(gridSize, divisions, 0x4444ff, 0x222244);
scene.add(grid);

// ---------------- WAVES ----------------
let emWaves = [];
let gwEvents = [];

// ---------------- EM PULSE (rings in shader-like form) ----------------
function emitEM(){
    emWaves.push({t:performance.now()*0.001});
}

// ---------------- GW EVENT ----------------
function emitGW(){
    gwEvents.push({t:performance.now()*0.001});
}

// ---------------- PHYSICS CONSTANTS ----------------
const c = 1.0;
const k = 2.0;

// EM FIELD
function EM(r,t,t0){
    let dt = t - t0;
    return Math.sin(k*r - c*dt) / (1 + 0.1*r);
}

// GW STRAIN
function GW(r,t,t0){
    let dt = t - t0;
    return Math.sin(1.5*k*r - 0.7*c*dt) / (1 + 0.08*r);
}

// ---------------- RAYCAST DRAG ----------------
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

let dragging = false;

window.addEventListener("mousedown",(e)=>{
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;

    raycaster.setFromCamera(mouse,camera);
    const hit = raycaster.intersectObject(earth);

    if(hit.length) dragging = true;
});

window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",(e)=>{
    if(!dragging) return;

    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;

    raycaster.setFromCamera(mouse,camera);

    const plane = new THREE.Plane(new THREE.Vector3(0,1,0),0);
    const pos = new THREE.Vector3();

    raycaster.ray.intersectPlane(plane,pos);
    earth.position.copy(pos);
});

// ---------------- DETECTOR ----------------
const readout = document.getElementById("readout");

// ---------------- ANIMATION ----------------
function animate(){

    requestAnimationFrame(animate);

    let t = performance.now()*0.001;

    sun.rotation.y += 0.01;

    // EM effect visualization (scale sun glow)
    sun.scale.setScalar(1 + 0.2*Math.sin(t*2));

    // GRID DISTORTION (GW effect)
    const pos = grid.geometry.attributes.position;

    for(let i=0;i<pos.count;i++){

        let x = pos.getX(i);
        let z = pos.getZ(i);

        let r = Math.sqrt(x*x + z*z);

        let h = 0;

        for(let g of gwEvents){
            h += GW(r,t,g.t);
        }

        pos.setY(i, h*1.5);
    }

    pos.needsUpdate = true;

    // DETECTOR SIGNAL AT EARTH
    let signal = 0;

    let r = earth.position.length();

    for(let e of emWaves){
        signal += EM(r,t,e.t);
    }

    for(let g of gwEvents){
        signal += GW(r,t,g.t);
    }

    readout.innerHTML =
        "Detector: " + signal.toFixed(4);

    controls.update();
    renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
