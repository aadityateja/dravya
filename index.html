<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DRAVYA η Geometry</title>
<style>
  body { margin: 0; overflow: hidden; background: black; }
  canvas { display: block; }
  #info {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: monospace;
    background: rgba(0,0,0,0.5);
    padding: 10px;
  }
</style>
</head>
<body>

<div id="info">
DRAVYA η-CONES<br>
Scroll + Drag to explore<br>
If you see this → rendering works
</div>

<script type="module">

import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js?module";

/* ================= SCENE ================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 8, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

/* ================= LIGHTS ================= */
scene.add(new THREE.AmbientLight(0xffffff, 0.6));

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

/* ================= AXES (BEAM = Z) ================= */
scene.add(new THREE.AxesHelper(10));

/* ================= CORE PHYSICS ================= */

function thetaFromEta(eta) {
  return 2 * Math.atan(Math.exp(-eta));
}

/* ================= η CONE ================= */
function createEtaCone(eta, color) {
  const theta = thetaFromEta(eta);

  const maxZ = 15;
  const rings = 40;
  const segments = 48;

  const positions = [];

  for (let i = 0; i <= rings; i++) {
    const z = (i / rings) * maxZ;
    const radius = z * Math.tan(theta);

    for (let j = 0; j <= segments; j++) {
      const angle = (j / segments) * Math.PI * 2;

      const x = radius * Math.cos(angle);
      const y = radius * Math.sin(angle);

      positions.push(x, y, z);
    }
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const material = new THREE.PointsMaterial({
    color,
    size: 0.2
  });

  return new THREE.Points(geometry, material);
}

/* ================= BUILD η SURFACES ================= */

const etaSet = [
  { eta: 0, color: 0xff4444 },
  { eta: 1, color: 0xffaa00 },
  { eta: 2, color: 0x00ffcc },
  { eta: 3, color: 0x4488ff },
  { eta: 4, color: 0xaa44ff }
];

etaSet.forEach(({ eta, color }) => {
  const cone = createEtaCone(eta, color);
  scene.add(cone);
});

/* ================= DEBUG CENTER POINT ================= */
const origin = new THREE.Mesh(
  new THREE.SphereGeometry(0.2, 16, 16),
  new THREE.MeshBasicMaterial({ color: 0xffffff })
);
scene.add(origin);

/* ================= ANIMATE ================= */
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();

/* ================= RESIZE ================= */
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
