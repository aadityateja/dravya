<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Physicist CV World v3</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
}

#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #7df9ff;
    z-index: 10;
    font-size: 13px;
    opacity: 0.85;
}

#panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 340px;
    padding: 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #1ff0ff33;
    color: #cfffff;
    display: none;
}
</style>
</head>

<body>

<div id="hud">
🧙 DARK CV WORLD v3 — WASD move | 1-4 spells | Enter simulation
</div>

<div id="panel"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer;
let player, mixer;
let buildings = [];
let keys = {};
let clock = new THREE.Clock();

const panel = document.getElementById("panel");

init();
animate();

function init(){

    // 🌌 Scene
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 10, 80);

    // 🎥 Camera
    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 10);

    // 🎮 Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 🌠 Star field
    const geo = new THREE.BufferGeometry();
    const arr = [];

    for(let i=0;i<2000;i++){
        arr.push((Math.random()-0.5)*250);
        arr.push((Math.random()-0.5)*250);
        arr.push((Math.random()-0.5)*250);
    }

    geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

    const stars = new THREE.Points(
        geo,
        new THREE.PointsMaterial({ color: 0x88ffff, size: 0.15 })
    );

    scene.add(stars);

    // 🌍 Ground grid
    const grid = new THREE.GridHelper(120, 60, 0x0ff0ff, 0x111111);
    scene.add(grid);

    // 🧙 PLAYER (wizard placeholder)
    const geoP = new THREE.ConeGeometry(0.8, 2, 6);
    const matP = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true
    });

    player = new THREE.Mesh(geoP, matP);
    player.position.set(0,1,6);
    scene.add(player);

    // 🏛️ CV STRUCTURES
    createBuilding("ABOUT TOWER", -12,0,0, "Identity field of Dravya — physicist explorer.");
    createBuilding("SKILL REACTOR", 12,0,0, "Python, ML, DL, Three.js, simulations.");
    createBuilding("PROJECT HANGAR", 0,0,-18, "AI systems, quantum-inspired models.");
    createBuilding("CONTACT RIFT", 0,0,18, "GitHub • LinkedIn • Research links");

    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("keyup", onKeyUp);

    window.addEventListener("resize", onResize);

    // ⚡ INTRO SEQUENCE
    introSequence();
}

function introSequence(){
    camera.position.set(0,20,40);

    let t = 0;
    const intro = setInterval(()=>{
        t += 0.03;

        camera.position.y = 20 - t*10;
        camera.position.z = 40 - t*25;

        if(t>=1){
            clearInterval(intro);
        }
    },16);
}

function createBuilding(name,x,y,z,desc){

    const geo = new THREE.BoxGeometry(3,7,3);
    const mat = new THREE.MeshBasicMaterial({
        color: 0x0ff0ff,
        wireframe: true
    });

    const b = new THREE.Mesh(geo, mat);
    b.position.set(x,y+3.5,z);
    b.userData = { name, desc, active:false };

    scene.add(b);
    buildings.push(b);
}

function onKeyDown(e){
    keys[e.key.toLowerCase()] = true;

    // 🪄 SPELLS
    switch(e.key){
        case "1": castSpell("ABOUT TOWER"); break;
        case "2": castSpell("SKILL REACTOR"); break;
        case "3": castSpell("PROJECT HANGAR"); break;
        case "4": castSpell("CONTACT RIFT"); break;
    }
}

function onKeyUp(e){
    keys[e.key.toLowerCase()] = false;
}

function castSpell(targetName){

    buildings.forEach(b=>{
        if(b.userData.name === targetName){
            b.scale.set(1.4,1.4,1.4);
            b.material.color.set(0xffffff);

            panel.style.display = "block";
            panel.innerHTML = `
                <b style="color:#7df9ff">${b.userData.name}</b><br><br>
                ${b.userData.desc}
            `;
        }
    });
}

function movePlayer(){

    let speed = 0.14;

    if(keys["w"]) player.position.z -= speed;
    if(keys["s"]) player.position.z += speed;
    if(keys["a"]) player.position.x -= speed;
    if(keys["d"]) player.position.x += speed;
}

function updateCamera(){

    camera.position.x += (player.position.x - camera.position.x) * 0.08;
    camera.position.z += (player.position.z + 8 - camera.position.z) * 0.08;
    camera.position.y = 3;

    camera.lookAt(player.position);
}

function animate(){

    requestAnimationFrame(animate);

    movePlayer();
    updateCamera();

    buildings.forEach(b=>{
        b.rotation.y += 0.002;
    });

    renderer.render(scene,camera);
}

function onResize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
