<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Physicist CV World v4</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
}

#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #7df9ff;
    font-size: 13px;
    z-index: 10;
    opacity: 0.85;
}

#panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 360px;
    padding: 12px;
    background: rgba(0,0,0,0.65);
    border: 1px solid #1ff0ff33;
    color: #cfffff;
    display: none;
}
</style>
</head>

<body>

<div id="hud">
🧙 CV WORLD v4 — GOD MODE | WASD move | 1-4 spells
</div>

<div id="panel"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player;
let buildings = [];
let particles = [];
let keys = {};

const panel = document.getElementById("panel");

init();
animate();

function init(){

    // 🌌 SCENE
    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 10, 90);

    // 🎥 CAMERA
    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
    camera.position.set(0,3,10);

    // 🎮 RENDERER
    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // 🌠 STAR FIELD (denser)
    const geo = new THREE.BufferGeometry();
    const arr = [];

    for(let i=0;i<3000;i++){
        arr.push((Math.random()-0.5)*300);
        arr.push((Math.random()-0.5)*300);
        arr.push((Math.random()-0.5)*300);
    }

    geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

    const stars = new THREE.Points(
        geo,
        new THREE.PointsMaterial({ color: 0x88ffff, size: 0.12 })
    );

    scene.add(stars);

    // 🌍 GRID
    const grid = new THREE.GridHelper(150, 70, 0x0ff0ff, 0x111111);
    scene.add(grid);

    // 🧙 PLAYER (wizard core form)
    const geoP = new THREE.ConeGeometry(0.9, 2.2, 6);
    const matP = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true
    });

    player = new THREE.Mesh(geoP, matP);
    player.position.set(0,1,6);
    scene.add(player);

    // ✨ AURA SYSTEM (fake glow field)
    const auraGeo = new THREE.SphereGeometry(1.8, 16, 16);
    const auraMat = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        wireframe: true,
        transparent: true,
        opacity: 0.15
    });

    player.aura = new THREE.Mesh(auraGeo, auraMat);
    player.add(player.aura);

    // 🏛️ CV BUILDINGS
    createBuilding("ABOUT", -14,0,0, "Identity of a physicist-builder.");
    createBuilding("SKILLS", 14,0,0, "Python • ML • DL • Three.js • Physics systems.");
    createBuilding("PROJECTS", 0,0,-20, "AI systems, simulations, quantum models.");
    createBuilding("CONTACT", 0,0,20, "GitHub • Research • Collaboration portal");

    window.addEventListener("keydown", onKeyDown);
    window.addEventListener("keyup", onKeyUp);
    window.addEventListener("resize", onResize);

    // ⚡ intro pulse
    intro();
}

function intro(){

    camera.position.set(0,25,50);

    let t = 0;
    const id = setInterval(()=>{

        t += 0.03;

        camera.position.y = 25 - t*15;
        camera.position.z = 50 - t*35;

        if(t>=1) clearInterval(id);

    },16);
}

function createBuilding(name,x,y,z,desc){

    const geo = new THREE.BoxGeometry(3.5,8,3.5);
    const mat = new THREE.MeshBasicMaterial({
        color: 0x0ff0ff,
        wireframe:true
    });

    const b = new THREE.Mesh(geo,mat);
    b.position.set(x,y+4,z);
    b.userData = { name, desc, active:false };

    scene.add(b);
    buildings.push(b);
}

function spawnParticles(pos){

    for(let i=0;i<20;i++){

        const geo = new THREE.SphereGeometry(0.08,6,6);
        const mat = new THREE.MeshBasicMaterial({ color: 0x7df9ff });

        const p = new THREE.Mesh(geo,mat);

        p.position.copy(pos);

        p.velocity = new THREE.Vector3(
            (Math.random()-0.5)*0.2,
            (Math.random()-0.5)*0.2,
            (Math.random()-0.5)*0.2
        );

        scene.add(p);
        particles.push(p);
    }
}

function castSpell(id){

    buildings.forEach(b=>{

        if(b.userData.name === id){

            b.scale.set(1.5,1.5,1.5);

            panel.style.display = "block";
            panel.innerHTML = `
                <b style="color:#7df9ff">${b.userData.name}</b><br><br>
                ${b.userData.desc}
            `;

            spawnParticles(b.position);
        }
    });
}

function onKeyDown(e){

    keys[e.key.toLowerCase()] = true;

    switch(e.key){
        case "1": castSpell("ABOUT"); break;
        case "2": castSpell("SKILLS"); break;
        case "3": castSpell("PROJECTS"); break;
        case "4": castSpell("CONTACT"); break;
    }
}

function onKeyUp(e){
    keys[e.key.toLowerCase()] = false;
}

function move(){

    const speed = 0.16;

    if(keys["w"]) player.position.z -= speed;
    if(keys["s"]) player.position.z += speed;
    if(keys["a"]) player.position.x -= speed;
    if(keys["d"]) player.position.x += speed;
}

function updateParticles(){

    particles.forEach((p,i)=>{

        p.position.add(p.velocity);
        p.velocity.y -= 0.003;

        if(p.position.length() > 50){
            scene.remove(p);
            particles.splice(i,1);
        }
    });
}

function cameraFollow(){

    camera.position.x += (player.position.x - camera.position.x) * 0.06;
    camera.position.z += (player.position.z + 10 - camera.position.z) * 0.06;
    camera.position.y = 3.5;

    camera.lookAt(player.position);
}

function animate(){

    requestAnimationFrame(animate);

    move();
    updateParticles();
    cameraFollow();

    // aura pulse
    player.aura.scale.x = player.aura.scale.y = player.aura.scale.z =
        1 + Math.sin(Date.now()*0.002)*0.2;

    buildings.forEach(b=>{
        b.rotation.y += 0.002;
    });

    renderer.render(scene,camera);
}

function onResize(){
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
}
</script>

</body>
</html>
