<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dark Physicist CV World v1</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: monospace;
        color: white;
    }

    #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        color: #7df9ff;
        font-size: 14px;
        opacity: 0.8;
        user-select: none;
    }

    #infoBox {
        position: absolute;
        bottom: 20px;
        left: 20px;
        width: 300px;
        padding: 12px;
        border: 1px solid #1ff0ff33;
        background: rgba(0,0,0,0.6);
        color: #cfffff;
        display: none;
        backdrop-filter: blur(6px);
    }
</style>
</head>

<body>
<div id="ui">🧬 DARK CV FIELD INITIALIZED — Move mouse / click nodes</div>
<div id="infoBox"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let nodes = [];
let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();
let hovered = null;

const infoBox = document.getElementById("infoBox");

init();
animate();

function init() {

    // 🌌 Scene
    scene = new THREE.Scene();

    // 🎥 Camera (observer mode)
    camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.z = 18;

    // 🎮 Renderer
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 🌠 Particle background (stars)
    const starGeo = new THREE.BufferGeometry();
    const starCount = 1000;
    const pos = [];

    for (let i = 0; i < starCount; i++) {
        pos.push(
            (Math.random() - 0.5) * 200,
            (Math.random() - 0.5) * 200,
            (Math.random() - 0.5) * 200
        );
    }

    starGeo.setAttribute("position", new THREE.Float32BufferAttribute(pos, 3));

    const starMat = new THREE.PointsMaterial({
        color: 0x88ffff,
        size: 0.2
    });

    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // ⚙️ CV NODES (core identity system)
    createNode("ABOUT",  -6, 2, 0, "A physicist-style explorer building interactive systems of intelligence.");
    createNode("SKILLS",   6, 2, 0, "Python, ML, DL, Three.js, Physics simulations, Data systems.");
    createNode("PROJECTS", 0, -3, 0, "AI systems, simulations, quantum-inspired models, web worlds.");
    createNode("CONTACT",  0, 6, 0, "GitHub • LinkedIn • Research • Collaboration portal");

    // 🎧 Mouse events
    window.addEventListener("mousemove", onMouseMove);
    window.addEventListener("click", onClick);

    window.addEventListener("resize", onResize);
}

function createNode(name, x, y, z, desc) {

    const geometry = new THREE.SphereGeometry(0.7, 32, 32);
    const material = new THREE.MeshBasicMaterial({
        color: 0x0ff0ff,
        wireframe: true
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(x, y, z);

    mesh.userData = { name, desc };

    scene.add(mesh);
    nodes.push(mesh);

    // glow ring
    const ringGeo = new THREE.RingGeometry(1, 1.3, 32);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.3
    });

    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.set(x, y, z);
    scene.add(ring);

    mesh.userData.ring = ring;
}

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function onClick() {
    if (hovered) {
        infoBox.style.display = "block";
        infoBox.innerHTML = `
            <b style="color:#7df9ff">${hovered.userData.name}</b><br><br>
            ${hovered.userData.desc}
        `;

        camera.position.x = hovered.position.x * 0.3;
        camera.position.y = hovered.position.y * 0.3;
    }
}

function animate() {
    requestAnimationFrame(animate);

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodes);

    // reset hover
    nodes.forEach(n => {
        n.material.color.set(0x0ff0ff);
        n.scale.set(1,1,1);
    });

    hovered = null;

    if (intersects.length > 0) {
        hovered = intersects[0].object;
        hovered.material.color.set(0xffffff);
        hovered.scale.set(1.4,1.4,1.4);
        document.body.style.cursor = "pointer";
    } else {
        document.body.style.cursor = "default";
    }

    // slow field drift (physics feel)
    nodes.forEach(n => {
        n.rotation.x += 0.002;
        n.rotation.y += 0.003;
        n.userData.ring.rotation.z += 0.002;
    });

    renderer.render(scene, camera);
}

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>
</body>
</html>
