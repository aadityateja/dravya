<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Physicist CV World v2</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: monospace;
}

#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #7df9ff;
    z-index: 10;
    font-size: 13px;
    opacity: 0.85;
}

#panel {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 320px;
    padding: 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid #1ff0ff33;
    color: #cfffff;
    display: none;
}
</style>
</head>

<body>
<div id="hud">🧙 DARK CV FIELD v2 — WASD to move | Walk into structures</div>
<div id="panel"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, velocity = new THREE.Vector3();
let keys = {};

let buildings = [];
const panel = document.getElementById("panel");

init();
animate();

function init() {

    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 10, 60);

    camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 8);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 🌌 ground grid
    const grid = new THREE.GridHelper(100, 50, 0x0ff0ff, 0x111111);
    scene.add(grid);

    // 🌠 stars
    const geo = new THREE.BufferGeometry();
    const arr = [];

    for(let i=0;i<1500;i++){
        arr.push((Math.random()-0.5)*200);
        arr.push((Math.random()-0.5)*200);
        arr.push((Math.random()-0.5)*200);
    }

    geo.setAttribute("position", new THREE.Float32BufferAttribute(arr,3));

    const mat = new THREE.PointsMaterial({ color: 0x88ffff, size: 0.15 });
    const stars = new THREE.Points(geo, mat);
    scene.add(stars);

    // 🧙 PLAYER (wizard placeholder cube for now)
    const pGeo = new THREE.BoxGeometry(0.8,1.2,0.8);
    const pMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
    player = new THREE.Mesh(pGeo, pMat);
    player.position.set(0,1,5);
    scene.add(player);

    // 🏛️ BUILDINGS (CV SYSTEM)
    createBuilding("ABOUT TOWER", -10, 0, 0, "A physicist-style explorer building interactive systems.");
    createBuilding("SKILLS REACTOR", 10, 0, 0, "Python, ML, DL, Three.js, Physics simulations.");
    createBuilding("PROJECT HANGAR", 0, 0, -15, "AI systems, simulations, quantum-inspired models.");
    createBuilding("CONTACT SINGULARITY", 0, 0, 15, "GitHub • LinkedIn • Research portals");

    window.addEventListener("keydown", e=>keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e=>keys[e.key.toLowerCase()] = false);

    window.addEventListener("resize", onResize);
}

function createBuilding(name,x,y,z,desc){

    const geo = new THREE.BoxGeometry(3,6,3);
    const mat = new THREE.MeshBasicMaterial({
        color: 0x0ff0ff,
        wireframe: true
    });

    const b = new THREE.Mesh(geo, mat);
    b.position.set(x,y+3,z);
    b.userData = { name, desc };

    scene.add(b);
    buildings.push(b);
}

function movePlayer(){

    let speed = 0.12;

    if(keys["w"]) player.position.z -= speed;
    if(keys["s"]) player.position.z += speed;
    if(keys["a"]) player.position.x -= speed;
    if(keys["d"]) player.position.x += speed;
}

function checkInteraction(){

    let near = null;

    buildings.forEach(b=>{
        let dist = player.position.distanceTo(b.position);

        if(dist < 4){
            near = b;
        }
    });

    if(near){
        panel.style.display = "block";
        panel.innerHTML = `<b style="color:#7df9ff">${near.userData.name}</b><br><br>${near.userData.desc}`;
    } else {
        panel.style.display = "none";
    }
}

function animate(){

    requestAnimationFrame(animate);

    movePlayer();
    checkInteraction();

    // 🎥 camera follow (smooth physics feel)
    camera.position.x += (player.position.x - camera.position.x) * 0.08;
    camera.position.z += (player.position.z + 6 - camera.position.z) * 0.08;
    camera.position.y = 2;

    camera.lookAt(player.position);

    // subtle drift
    buildings.forEach(b=>{
        b.rotation.y += 0.002;
    });

    renderer.render(scene, camera);
}

function onResize(){
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}
</script>

</body>
</html>
