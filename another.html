<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dravya Mountain 3D Pixel World v1</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
#hud {
    position:absolute;
    top:10px;
    left:10px;
    color:#b6f7ff;
    font-family:monospace;
    font-size:13px;
    z-index:10;
}
</style>
</head>

<body>
<div id="hud">🧭 DRAVYA 3D WORLD — WASD MOVE | MOUSE LOOK</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene, camera, renderer;
let player, velocity = new THREE.Vector3();
let keys = {};

init();
animate();

function init(){

    scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x000000, 10, 80);

    camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

    renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    // 🌍 LIGHT
    const light = new THREE.AmbientLight(0x88ffff, 0.6);
    scene.add(light);

    const dir = new THREE.DirectionalLight(0xffffff, 0.6);
    dir.position.set(10,20,10);
    scene.add(dir);

    // 🧍 PLAYER
    player = new THREE.Object3D();
    scene.add(player);
    player.position.set(0,2,10);

    camera.position.set(0,3,0);
    player.add(camera);

    // 🌲 TERRAIN BASE
    createZone(0,0,0, 20,0x1e90ff);   // lake
    createZone(-25,0,-10, 25,0x2ecc71); // forest
    createZone(25,0,-20, 25,0x95a5a6); // mountain path
    createZone(60,0,-25, 30,0x7f8c8d); // castle zone

    // 🌊 WATERFALL
    createWaterfall(10,0,-10);

    window.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
    window.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

    window.addEventListener("resize",onResize);
}

// 🟩 simple pixel-style blocks
function createZone(x,y,z,size,color){

    const geo = new THREE.BoxGeometry(size,1,size);
    const mat = new THREE.MeshLambertMaterial({ color });

    const mesh = new THREE.Mesh(geo,mat);
    mesh.position.set(x,y,z);
    scene.add(mesh);

    // little elevation blocks (pixel feel)
    for(let i=0;i<10;i++){
        const rock = new THREE.Mesh(
            new THREE.BoxGeometry(2,Math.random()*4+1,2),
            new THREE.MeshLambertMaterial({color:0x333333})
        );
        rock.position.set(
            x + (Math.random()-0.5)*size,
            1,
            z + (Math.random()-0.5)*size
        );
        scene.add(rock);
    }
}

// 💧 waterfall illusion
function createWaterfall(x,y,z){

    const geo = new THREE.BoxGeometry(2,10,2);
    const mat = new THREE.MeshBasicMaterial({
        color:0x00aaff,
        transparent:true,
        opacity:0.5
    });

    const water = new THREE.Mesh(geo,mat);
    water.position.set(x,5,z);
    scene.add(water);
}

// 🎮 movement
function move(){

    let speed = 0.2;

    if(keys["w"]||keys["arrowup"]) player.translateZ(-speed);
    if(keys["s"]||keys["arrowdown"]) player.translateZ(speed);
    if(keys["a"]||keys["arrowleft"]) player.translateX(-speed);
    if(keys["d"]||keys["arrowright"]) player.translateX(speed);
}

function animate(){

    requestAnimationFrame(animate);

    move();

    renderer.render(scene,camera);
}

function onResize(){
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
}
</script>

</body>
</html>
