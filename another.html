<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fantasy Pixel World</title>
<style>
body { margin:0; overflow:hidden; background:#000; }
#info {
  position:absolute;
  top:10px; left:10px;
  color:white;
  font-family:monospace;
  z-index:1;
}
</style>
</head>
<body>
<div id="info">Click to enter world | WASD move | Mouse look</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x87ceeb, 20, 120);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHTS
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0x666666));

// =====================
// TERRAIN (PIXEL WORLD)
// =====================
let blockGeo = new THREE.BoxGeometry(1,1,1);

function block(x,y,z,color){
  let mat = new THREE.MeshLambertMaterial({color});
  let m = new THREE.Mesh(blockGeo, mat);
  m.position.set(x,y,z);
  scene.add(m);
}

// Ground
for(let x=-25;x<25;x++){
  for(let z=-25;z<25;z++){
    let height = Math.floor(Math.sin(x*0.2)*2 + Math.cos(z*0.2)*2);
    block(x, height-2, z, 0x2e8b57);
  }
}

// River
for(let x=-25;x<25;x++){
  let z = Math.floor(Math.sin(x*0.2)*6);
  block(x, -2, z, 0x1e90ff);
  block(x, -3, z, 0x1e90ff);
}

// Waterfall
for(let y=5;y>-2;y--){
  block(-10, y, 5, 0x00bfff);
}

// Forest
for(let i=0;i<80;i++){
  let x = Math.random()*40-20;
  let z = Math.random()*40-20;
  block(x,0,z,0x006400);
  block(x,1,z,0x228B22);
}

// Shrine
function shrine(x,z){
  block(x,0,z,0xaaaaaa);
  block(x,1,z,0xffffff);
  block(x+1,0,z,0xaaaaaa);
  block(x-1,0,z,0xaaaaaa);
}
shrine(8,8);
shrine(-12,10);

// Castle (MAIN GOAL 🏰)
function castle(cx,cz){
  for(let y=0;y<6;y++){
    for(let x=-3;x<=3;x++){
      for(let z=-3;z<=3;z++){
        if(Math.abs(x)===3 || Math.abs(z)===3 || y===0)
          block(cx+x,y,cz+z,0x808080);
      }
    }
  }
  // towers
  block(cx+4,6,cz+4,0xaaaaaa);
  block(cx-4,6,cz+4,0xaaaaaa);
  block(cx+4,6,cz-4,0xaaaaaa);
  block(cx-4,6,cz-4,0xaaaaaa);
}
castle(15,15);

// =====================
// PLAYER CONTROLS
// =====================
camera.position.set(0,2,5);

let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();

let keys = {};

document.addEventListener('keydown', e=>keys[e.key.toLowerCase()]=true);
document.addEventListener('keyup', e=>keys[e.key.toLowerCase()]=false);

let pointerLocked = false;

document.body.addEventListener('click', ()=>{
  document.body.requestPointerLock();
});

document.addEventListener('pointerlockchange', ()=>{
  pointerLocked = !!document.pointerLockElement;
});

let yaw = 0, pitch = 0;

document.addEventListener('mousemove', (e)=>{
  if(!pointerLocked) return;
  yaw -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-1.5, Math.min(1.5, pitch));
});

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  direction.set(0,0,0);

  if(keys['w']) direction.z -= 1;
  if(keys['s']) direction.z += 1;
  if(keys['a']) direction.x -= 1;
  if(keys['d']) direction.x += 1;

  direction.normalize();

  let speed = 0.2;

  camera.position.x += (Math.sin(yaw)*direction.z + Math.cos(yaw)*direction.x)*speed;
  camera.position.z += (Math.cos(yaw)*direction.z - Math.sin(yaw)*direction.x)*speed;

  camera.position.y = 2;

  camera.rotation.set(pitch, yaw, 0);

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
